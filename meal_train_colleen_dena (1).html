<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Meal Train for Colleen & Dena</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f9f8f6;
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .container { width: 100%; max-width: 560px; }
  h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
  .subtitle { font-size: 14px; color: #666; margin-bottom: 1.5rem; }
  .progress-bar { height: 4px; background: #e0e0e0; border-radius: 2px; margin-bottom: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: #3d9e6e; border-radius: 2px; transition: width 0.4s; }
  .summary { font-size: 13px; color: #888; margin-bottom: 1.5rem; }
  .week-header { font-size: 12px; font-weight: 500; color: #999; text-transform: uppercase; letter-spacing: 0.06em; margin: 1.5rem 0 0.6rem; }
  .slot { background: #fff; border: 0.5px solid #e2e2e2; border-radius: 8px; padding: 0.875rem 1rem; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
  .slot.claimed { background: #f5f5f3; }
  .slot-date { font-size: 13px; color: #888; min-width: 90px; }
  .slot-info { flex: 1; }
  .slot-name { font-size: 14px; font-weight: 500; }
  .slot-open { font-size: 14px; color: #bbb; }
  .slot-sub { font-size: 12px; color: #999; margin-top: 2px; }
  .claim-btn { font-size: 13px; padding: 6px 14px; background: transparent; border: 0.5px solid #ccc; border-radius: 8px; cursor: pointer; color: #1a1a1a; white-space: nowrap; }
  .claim-btn:hover { background: #f0f0ee; }
  .badge { font-size: 11px; padding: 3px 8px; border-radius: 6px; background: #e6f4ee; color: #2a7a52; font-weight: 500; white-space: nowrap; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 12px; border: 0.5px solid #e2e2e2; padding: 1.5rem; width: 100%; max-width: 340px; }
  .modal h3 { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
  .modal-sub { font-size: 13px; color: #888; margin-bottom: 1rem; }
  .modal input { width: 100%; margin-bottom: 8px; font-size: 14px; padding: 8px 10px; border: 0.5px solid #ccc; border-radius: 8px; background: #fff; color: #1a1a1a; outline: none; font-family: inherit; }
  .modal input:focus { border-color: #999; }
  .modal-actions { display: flex; gap: 8px; margin-top: 4px; }
  .btn-primary { flex: 1; padding: 9px; background: #1a1a1a; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: 500; font-family: inherit; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-cancel { padding: 9px 14px; background: transparent; border: 0.5px solid #ccc; border-radius: 8px; font-size: 14px; cursor: pointer; color: #666; font-family: inherit; }
  .loading { text-align: center; padding: 2rem; font-size: 14px; color: #aaa; }
  .error { text-align: center; padding: 1rem; font-size: 13px; color: #c0392b; }
</style>
</head>
<body>
<div class="container">
  <h1>Meal train for Colleen & Dena</h1>
  <p class="subtitle">Apr 21 – May 15 · 2 meals per week · Sign up below!</p>

  <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
  <p class="summary" id="summary-text">Loading…</p>

  <div id="slots-container"><div class="loading">Loading signups…</div></div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3 id="modal-title">Sign up for this meal</h3>
    <p class="modal-sub" id="modal-sub"></p>
    <input type="text" id="input-name" placeholder="Your name" />
    <input type="text" id="input-meal" placeholder="What you're bringing (optional)" />
    <input type="text" id="input-note" placeholder="Note (dietary info, drop time…)" />
    <div class="modal-actions">
      <button class="btn-cancel" id="cancel-btn">Cancel</button>
      <button class="btn-primary" id="confirm-btn">Claim this slot</button>
    </div>
  </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzs9qAdBIjNrWuaVWuaiJSiBHpZPLyrPoCqblhn0AMsRrQFTqQXSPsOVBVtKdzwBYFS/exec";

const WEEKS = [
  { label: "Week 1", dates: ["Tue, Apr 21", "Fri, Apr 24"] },
  { label: "Week 2", dates: ["Tue, Apr 28", "Fri, May 1"] },
  { label: "Week 3", dates: ["Tue, May 5",  "Fri, May 8"] },
  { label: "Week 4", dates: ["Tue, May 12", "Fri, May 15"] },
];
const SLOT_IDS = WEEKS.flatMap((w, wi) => w.dates.map((_, di) => `${wi}-${di}`));

let slots = {};
let activeSlotId = null;

function slotMeta(id) {
  const [wi, di] = id.split("-").map(Number);
  return { week: WEEKS[wi].label, date: WEEKS[wi].dates[di] };
}

async function loadSlots() {
  try {
    const res = await fetch(SCRIPT_URL);
    slots = await res.json();
  } catch {
    slots = {};
    document.getElementById("slots-container").innerHTML =
      '<div class="error">Could not load signups. Please refresh.</div>';
    return;
  }
  render();
}

async function saveSlot(slotId, data) {
  const res = await fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify({ slot_id: slotId, ...data }),
  });
  return res.json();
}

function claimed() { return Object.keys(slots).filter(k => slots[k]).length; }

function render() {
  const container = document.getElementById("slots-container");
  container.innerHTML = "";
  let lastWeek = null;

  SLOT_IDS.forEach(id => {
    const { week, date } = slotMeta(id);
    const entry = slots[id];

    if (week !== lastWeek) {
      const hdr = document.createElement("div");
      hdr.className = "week-header";
      hdr.textContent = week;
      container.appendChild(hdr);
      lastWeek = week;
    }

    const el = document.createElement("div");
    el.className = "slot" + (entry ? " claimed" : "");
    el.innerHTML = `
      <div class="slot-date">${date}</div>
      <div class="slot-info">
        ${entry
          ? `<div class="slot-name">${entry.name}</div>
             <div class="slot-sub">${entry.meal || "Surprise meal"}${entry.note ? " · " + entry.note : ""}</div>`
          : `<div class="slot-open">Open</div>`}
      </div>
      ${entry
        ? `<span class="badge">Claimed</span>`
        : `<button class="claim-btn" data-id="${id}">Sign up</button>`}
    `;
    container.appendChild(el);
  });

  const c = claimed();
  document.getElementById("summary-text").textContent = `${c} of 8 slots claimed`;
  document.getElementById("progress").style.width = `${(c / 8) * 100}%`;

  container.querySelectorAll(".claim-btn").forEach(btn => {
    btn.addEventListener("click", () => openModal(btn.dataset.id));
  });
}

function openModal(id) {
  activeSlotId = id;
  const { week, date } = slotMeta(id);
  document.getElementById("modal-title").textContent = "Sign up for " + date;
  document.getElementById("modal-sub").textContent = week + " · Drop off for Colleen & Dena";
  ["input-name","input-meal","input-note"].forEach(i => document.getElementById(i).value = "");
  document.getElementById("modal-overlay").classList.add("open");
  setTimeout(() => document.getElementById("input-name").focus(), 50);
}

function closeModal() {
  document.getElementById("modal-overlay").classList.remove("open");
  activeSlotId = null;
}

document.getElementById("cancel-btn").addEventListener("click", closeModal);
document.getElementById("modal-overlay").addEventListener("click", e => {
  if (e.target === document.getElementById("modal-overlay")) closeModal();
});

document.getElementById("confirm-btn").addEventListener("click", async () => {
  const name = document.getElementById("input-name").value.trim();
  if (!name) { document.getElementById("input-name").focus(); return; }

  const btn = document.getElementById("confirm-btn");
  btn.textContent = "Saving…";
  btn.disabled = true;

  const data = {
    name,
    meal: document.getElementById("input-meal").value.trim() || null,
    note: document.getElementById("input-note").value.trim() || null,
  };

  try {
    await saveSlot(activeSlotId, data);
    slots[activeSlotId] = data;
    closeModal();
    render();
  } catch {
    btn.textContent = "Error — try again";
  } finally {
    btn.textContent = "Claim this slot";
    btn.disabled = false;
  }
});

loadSlots();
</script>
</body>
</html>
